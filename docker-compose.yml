version: "3.8"

services:
  # Database
  db:
    image: mysql:8.0
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=procure_to_pay
      - MYSQL_USER=procurement
      - MYSQL_PASSWORD=procurement123
      - MYSQL_ROOT_PASSWORD=rootpassword123
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password

  # Redis for Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    environment:
      - SECRET_KEY=your-super-secret-key-change-this-in-production
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend
      - DB_NAME=procure_to_pay
      - DB_USER=procurement
      - DB_PASSWORD=procurement123
      - DB_HOST=db
      - DB_PORT=3306
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 --reload procure_to_pay.wsgi:application"

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - media_files:/app/media
    environment:
      - SECRET_KEY=your-super-secret-key-change-this-in-production
      - DEBUG=True
      - DB_NAME=procure_to_pay
      - DB_USER=procurement
      - DB_PASSWORD=procurement123
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    command: celery -A procure_to_pay worker -l info

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - REACT_APP_WEBSOCKET_URL=ws://localhost:8000/ws
    depends_on:
      - backend

volumes:
  mysql_data:
  media_files:
