version: "3.8"

services:
  # Redis for Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
      - sqlite_data:/code
    environment:
      - SECRET_KEY=your-super-secret-key-change-this-in-production
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,backend
      - USE_SQLITE=True
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/code
    environment:
      - SECRET_KEY=your-super-secret-key-change-this-in-production
      - DEBUG=True
      - USE_SQLITE=True
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    command: celery -A procure_to_pay worker -l info

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
      - REACT_APP_WEBSOCKET_URL=ws://localhost:8000/ws
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  sqlite_data:
